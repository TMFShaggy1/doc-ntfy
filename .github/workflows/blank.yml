name: DoC to ntfy

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch:

jobs:
  check-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check SiftRSS and send to ntfy
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SIFTRSS_URL: https://siftrss.com/f/dAwaVXrqLm
        run: |
          set -e # Exit on error so we see real failures

          # Install xml tools
          sudo apt-get update && sudo apt-get install -y xmlstarlet

          # Download feed
          curl -sL "$SIFTRSS_URL" -o feed.xml

          # Check feed actually downloaded
          if [! -s feed.xml ]; then
            echo "Feed download failed or empty"
            exit 1
          fi

          # Parse latest item with xmlstarlet - way more reliable than grep
          LATEST_GUID=$(xmlstarlet sel -t -v "/rss/channel/item[1]/guid" feed.xml || echo "")
          LATEST_TITLE=$(xmlstarlet sel -t -v "/rss/channel/item[1]/title" feed.xml || echo "")
          LATEST_LINK=$(xmlstarlet sel -t -v "/rss/channel/item[1]/link" feed.xml || echo "")

          if [ -z "$LATEST_GUID" ]; then
            echo "No items in feed yet. Exiting."
            exit 0
          fi

          echo "Latest: $LATEST_TITLE"

          # Restore last guid from cache
          mkdir -p /tmp/cache
          CACHE_FILE=/tmp/cache/doc_last_guid.txt
          touch $CACHE_FILE
          LAST_GUID=$(cat $CACHE_FILE)

          if [ "$LATEST_GUID"!= "$LAST_GUID" ]; then
            echo "New post detected. Sending to ntfy..."
            echo "$LATEST_GUID" > $CACHE_FILE

            curl -s -d "$LATEST_TITLE" \
              -H "Title: Doctor of Credit" \
              -H "Click: $LATEST_LINK" \
              -H "Tags: moneybag" \
              -H "Priority: 4" \
              https://ntfy.sh/$NTFY_TOPIC

            echo "Sent!"
          else
            echo "No new posts since last run"
          fi

      - name: Cache last guid
        uses: actions/cache@v4
        with:
          path: /tmp/cache
          key: doc-guid-cache-v2
          restore-keys: |
            doc-guid-cache-v2
