name: DoC to ntfy

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-feed:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xmlstarlet
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet

      - name: Check feed
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SIFTRSS_URL: https://siftrss.com/f/odq838krvR
        run: |
          set -e

          mkdir -p .state

          curl -sL "$SIFTRSS_URL" -o feed.xml

          if [ ! -s feed.xml ]; then
            echo "Feed empty"
            exit 1
          fi

          LATEST_GUID=$(xmlstarlet sel -t -v "/rss/channel/item[1]/guid" feed.xml)
          LATEST_TITLE=$(xmlstarlet sel -t -v "/rss/channel/item[1]/title" feed.xml)
          LATEST_LINK=$(xmlstarlet sel -t -v "/rss/channel/item[1]/link" feed.xml)

          echo "Latest: $LATEST_TITLE"

          STATE_FILE=".state/latest_guid.txt"

          if [ ! -f "$STATE_FILE" ]; then
            touch "$STATE_FILE"
          fi

          LAST_GUID=$(cat "$STATE_FILE")

          if [ "$LATEST_GUID" != "$LAST_GUID" ]; then
            echo "New post found"

            echo "$LATEST_GUID" > "$STATE_FILE"

            curl -s \
              -X POST \
              -H "Content-Type: text/plain" \
              -H "Title: Doctor of Credit" \
              -H "Click: $LATEST_LINK" \
              -H "Tags: moneybag" \
              -H "Priority: 4" \
              -d "$LATEST_TITLE" \
              "https://ntfy.sh/$NTFY_TOPIC"

          else
            echo "No new posts"
          fi

      - name: Commit state
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .state/latest_guid.txt

          git diff --cached --quiet || git commit -m "Update latest GUID"

          git push
